<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket Balancer Tester</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #1e293b;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #38bdf8;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #0f172a;
      color: #f8fafc;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #38bdf8;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background: #7dd3fc;
    }
    button:active {
      transform: scale(0.98);
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 0.5rem;
      font-weight: bold;
      font-size: 1.125rem;
      display: none;
    }
    .result.valid {
      display: block;
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border: 1px solid #22c55e;
    }
    .result.invalid {
      display: block;
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid #ef4444;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bracket Balancer</h1>
    <input type="text" id="bracketInput" placeholder="Enter brackets (e.g. {[()]})" />
    <button onclick="checkBrackets()">Check Balance</button>
    <div id="result" class="result"></div>
  </div>

  <script>
    // Note: I have fixed a couple of logical bugs from your original code.
    const bracketPairs = {
      "}": "{",
      ")": "(",
      "]": "[",
    };

    function isBalancedBrackets(str) {
      const openBracketsStack = [];
      
      for (const bracket of str) {
        if (isClosingBracket(bracket)) {
          const expectedOpenBracket = bracketPairs[bracket];
          const lastOpenBracket = openBracketsStack.length ? openBracketsStack.pop() : "#";

          // FIX 1: We must return false if they DON'T match. 
          // Your original code returned true if they DID match, which prematurely stopped the loop!
          if (expectedOpenBracket !== lastOpenBracket) {
            return false;
          }
        } else {
          openBracketsStack.push(bracket);
        }
      }

      // If the stack is empty, all open brackets were closed.
      return openBracketsStack.length === 0;
    }

    // FIX 2: Your array had '}' repeated and was missing ']'. I fixed the array here.
    const isClosingBracket = (bracket) => [")", "}", "]"].includes(bracket);

    function checkBrackets() {
      const input = document.getElementById("bracketInput").value;
      const resultDiv = document.getElementById("result");
      
      if (!input.trim()) {
        resultDiv.className = "result";
        resultDiv.textContent = "";
        return;
      }

      const isValid = isBalancedBrackets(input);
      
      if (isValid) {
        resultDiv.className = "result valid";
        resultDiv.textContent = "✅ Balanced!";
      } else {
        resultDiv.className = "result invalid";
        resultDiv.textContent = "❌ Not Balanced!";
      }
    }

    // Allow pressing "Enter" in the input field
    document.getElementById("bracketInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        checkBrackets();
      }
    });
  </script>
</body>
</html>
